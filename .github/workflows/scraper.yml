name: Weekly event scrape and Pages deploy

on:
  schedule:
    - cron: "0 8 * * 0"
      timezone: "Asia/Singapore"
  workflow_dispatch:
    inputs:
      refresh_data:
        description: Scrape sources before deploying; disable to deploy the committed dashboard
        required: true
        default: true
        type: boolean

concurrency:
  group: jjs-event-agent-pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ${{ vars.SCRAPER_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    env:
      TIMEZONE: Asia/Singapore
      ENABLED_SOURCES: linkedin,eventbrite,luma,meetup
      PLAYWRIGHT_HEADLESS: "true"
      SOURCE_FAILURE_MODE: warn
      LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
      LINKEDIN_COOKIES_JSON: ${{ secrets.LINKEDIN_COOKIES_JSON }}
      EVENTBRITE_COOKIES_JSON: ${{ secrets.EVENTBRITE_COOKIES_JSON }}
      LUMA_COOKIES_JSON: ${{ secrets.LUMA_COOKIES_JSON }}
      LUMA_PRIVATE_URLS: ${{ secrets.LUMA_PRIVATE_URLS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test tools
        run: python -m pip install -e ".[dev]"

      - name: Install Chromium
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: python -m playwright install --with-deps chromium

      - name: Run quality checks
        run: |
          ruff check .
          pytest

      - name: Back up current dashboard
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: cp index.html "${RUNNER_TEMP}/index.previous.html"

      - name: Collect events and refresh dashboard
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: python -m event_agent

      - name: Preserve last populated dashboard after an empty scrape
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: |
          previous_count=$(grep -c '<article class="card' "${RUNNER_TEMP}/index.previous.html" || true)
          current_count=$(grep -c '<article class="card' index.html || true)
          if [[ "${previous_count}" -gt 0 && "${current_count}" -eq 0 ]]; then
            echo "No events qualified; preserving the last populated dashboard"
            cp "${RUNNER_TEMP}/index.previous.html" index.html
          fi

      - name: Commit refreshed dashboard
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: |
          if git diff --quiet -- index.html; then
            echo "Dashboard is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refresh event dashboard"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare public site artifact
        run: |
          mkdir -p "${RUNNER_TEMP}/jjs-event-site"
          cp index.html "${RUNNER_TEMP}/jjs-event-site/index.html"
          touch "${RUNNER_TEMP}/jjs-event-site/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/jjs-event-site

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
