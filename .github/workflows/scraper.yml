name: Weekly event scrape and private dashboard

on:
  schedule:
    - cron: "0 8 * * 0"
      timezone: "Asia/Singapore"
  workflow_dispatch:
    inputs:
      refresh_data:
        description: Scrape sources before uploading; disable to use the committed dashboard
        required: true
        default: true
        type: boolean

concurrency:
  group: jjs-event-agent-private-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ${{ vars.SCRAPER_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    env:
      TIMEZONE: Asia/Singapore
      ENABLED_SOURCES: linkedin,eventbrite,luma,meetup,gdg
      PLAYWRIGHT_HEADLESS: "true"
      SOURCE_FAILURE_MODE: warn
      EMAIL_ENABLED: ${{ github.event_name == 'schedule' }}
      EMAIL_RECIPIENT: jeraldine.openai@outlook.com
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test tools
        run: python -m pip install -e ".[dev]"

      - name: Install Chromium
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: python -m playwright install --with-deps chromium

      - name: Run quality checks
        run: |
          ruff check .
          pytest

      - name: Back up current dashboard
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: cp index.html "${RUNNER_TEMP}/index.previous.html"

      - name: Collect events and refresh dashboard
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: python -m event_agent

      - name: Preserve last populated dashboard after an empty scrape
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: |
          previous_count=$(grep -c '<article class="event-card' "${RUNNER_TEMP}/index.previous.html" || true)
          current_count=$(grep -c '<article class="event-card' index.html || true)
          if [[ "${previous_count}" -gt 0 && "${current_count}" -eq 0 ]]; then
            echo "No events qualified; preserving the last populated dashboard"
            cp "${RUNNER_TEMP}/index.previous.html" index.html
          fi

      - name: Commit refreshed dashboard
        if: ${{ github.event_name == 'schedule' || inputs.refresh_data }}
        run: |
          if git diff --quiet -- index.html; then
            echo "Dashboard is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refresh event dashboard"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload owner-only dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-event-dashboard
          path: index.html
          if-no-files-found: error
          retention-days: 30

      - name: Add private dashboard instructions
        run: |
          {
            echo "## Private event dashboard"
            echo "Download **private-event-dashboard** from the Artifacts section of this run, unzip it, and open index.html."
            echo ""
            echo "This artifact requires read access to this private repository."
          } >> "${GITHUB_STEP_SUMMARY}"
